<!DOCTYPE html>
<html>
<head>
<title>Word Matching Quiz</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    padding:20px;
    display:flex;
    justify-content:center;
}

.container{
    background:white;
    padding:25px;
    border-radius:12px;
    width:100%;
    max-width:900px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.question{
    background:#f9f9ff;
    padding:15px;
    border-radius:8px;
    margin-bottom:12px;
    border-left:5px solid #4a6cf7;
}

.word{
    font-weight:bold;
    margin-bottom:6px;
    font-size:16px;
}

select{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:14px;
}

.correct{
background:#d4edda;
border:2px solid #28a745;
}

.wrong{
background:#f8d7da;
border:2px solid #dc3545;
}

button{
    width:100%;
    padding:12px;
    background:#4a6cf7;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#3555d4;
}

#score{
    text-align:center;
    margin-top:20px;
    font-size:20px;
    font-weight:bold;
}

/* ---------- Tablet ---------- */

@media (max-width:768px){

.container{
padding:20px;
}

.word{
font-size:15px;
}

select{
font-size:14px;
}

button{
font-size:15px;
}

}

/* ---------- Mobile ---------- */

@media (max-width:480px){

body{
padding:10px;
}

h2{
font-size:20px;
}

.container{
padding:15px;
}

.word{
font-size:14px;
}

select{
padding:8px;
font-size:13px;
}

button{
padding:10px;
font-size:14px;
}

#score{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="container">

<h2>Match the Word with the Meaning</h2>

<div id="quiz"></div>

<button onclick="checkAnswers()">Check Answers</button>

<div id="score"></div>

</div>

<script>

const words=[
"Habitat","Price tag","Machine","Study habits","Flyer","Get along with",
"Resource","Celebrate","Price","Command","Dormitory","Information",
"Fireworks","Cope with","Decorate","Growth","Costume",
"First come-first served","Market","Pardon me"
];

const meanings=[
" 1 The place where an animal or plant naturally lives.",
"2 A label on an item that shows how much it costs.",
"3 A tool with parts that does work, like a computer or a washing machine.",
"4 The regular ways that a student practices and prepares for lessons or exams.",
"5 A small paper with information about an event or product.",
"6 To have a good relationship with someone.",
"7 Something useful that helps you do or get something.",
"8 To do something special for an important event (like a graduation).",
"9 The amount of money something costs.",
"10 A strong order someone gives you.",
"11 A big bedroom where many people sleep, often at a school or college.",
"12 Facts or details provided about something or someone.",
"13 Small objects that explode to create bright colors and loud noises in the sky.",
"14 To deal effectively with something difficult (like stress).",
"15 To make something look nice by adding things (like lights or ornaments).",
"16 The process of increasing in size or importance.",
"17 A set of clothes worn by an actor or at a festival to look like someone else.",
"18 A policy where the people who arrive first are dealt with first.",
"19 A place where people meet to buy and sell goods.",
" 20 A polite way to say sorry or to get someone's attention."
];

function shuffle(arr){
for(let i=arr.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

const quiz=document.getElementById("quiz");

words.forEach((word,index)=>{

let div=document.createElement("div");
div.className="question";

let label=document.createElement("div");
label.className="word";
label.innerText=word;

let select=document.createElement("select");
select.id="q"+index;

let randomMeanings=shuffle([...meanings]);

randomMeanings.forEach(m=>{
let option=document.createElement("option");
option.value=m;
option.text=m;
select.appendChild(option);
});

div.appendChild(label);
div.appendChild(select);

quiz.appendChild(div);

});

function checkAnswers(){

let score=0;

words.forEach((word,index)=>{

let select=document.getElementById("q"+index);
let answer=select.value;

select.classList.remove("correct","wrong");

if(answer===meanings[index]){
score++;
select.classList.add("correct");
}
else{
select.classList.add("wrong");
}

});

document.getElementById("score").innerHTML=
"Your Score: "+score+" / "+words.length;

}

</script>

</body>
</html>
